<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content= "width=device-width, initial-scale=1.0" >
        <title>HARMONI - Login</title>
        <link rel="stylesheet" href="../CSS/style.css">
    </head>
    <body>
        <div class="container">
            
            <div class="header-logo">
                <h1>HARMONI</h1>
                <p>Pusat Oleh-oleh Jember</p>
            </div>

            <div class="login-card">
                <h2>Selamat datang</h2>
                <p class="subtitle">Silahkan masuk akun anda</p>

                <form>
                    <div class="input-group">
                        <label for="email">EMAIL ADDRESS</label>
                        <input type="email" id="email" placeholder="Masukkan email anda">
                    </div>

                    <div class="input-group">
                        <div class="password-header">
                            <label for="password">PASSWORD</label>
                            <p>Lupa Password? <a href="#" class="forgot-password">Klik disini</a></p>
                        </div>
                        <input type="password" id="password" placeholder="Masukkan password anda" >
                    </div>

                    <button type="button" class="btn-primary" onclick="window.location.href='homepage.html'">Sign In</button>
                </form>

                <div class="divider">
                    <span>ATAU MASUK MENGGUNAKAN</span>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary">Nomor Telepon</button>
                    <button type="button" class="btn-secondary">Akun Google</button>
                </div>
            </div>

           <div class="register-link">
                <p>Belum punya akun?</p>
                <a href="#" class="buat-akun">Buat Akun</a>
            </div>

            <div class="footer">
                <div class="footer-links">
                    <a href="#">KEBIJAKAN PRIVASI</a>
                    <a href="#">KETENTUAN LAYANAN </a>
            
                </div>
            </div>

         </div>
    </body>
</html>
