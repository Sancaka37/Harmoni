<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmoni - Keranjang Belanja</title>
    <link rel="stylesheet" href="../CSS/keranjang.css">
</head>
<body>

    <div class="cart-container">
        
        <div class="cart-box">
            
            <div class="cart-header">
                <div class="brand">
                    <img src="../Image/Logo no BG 1.png" alt="Logo Harmoni">
                    <h2>Harmoni</h2>
                </div>
                <button class="btn-close">✕</button>
            </div>

            <h1 class="cart-title">Keranjang Anda</h1>

            <div class="cart-items">
                
                <div class="cart-item">
                    <img src="../Image/Harmoni.png" alt="Marning Jagung" class="item-img">
                    <div class="item-info">
                        <h3>Marning Jagung</h3>
                        <p class="variant">Kategori rasa, hook</p>
                        <p class="price">Rp18.000,00</p>
                    </div>
                    <div class="item-actions">
                        <button class="btn-delete">🗑️</button>
                        <div class="qty-control">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </div>
                </div>

                <div class="cart-item">
                    <img src="../Image/Harmoni.png" alt="Kue Kacang" class="item-img">
                    <div class="item-info">
                        <h3>Kue Kacang</h3>
                        <p class="variant">Kategori rasa, hook</p>
                        <p class="price">Rp15.000,00</p>
                    </div>
                    <div class="item-actions">
                        <button class="btn-delete">🗑️</button>
                        <div class="qty-control">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </div>
                </div>

            </div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span class="label">SUBTOTAL</span>
                    <span class="value">Rp33.000,00</span>
                </div>
                <div class="summary-row">
                    <span class="label">ESTIMATED SHIPPING</span>
                    <span class="value-light">Calculated at checkout</span>
                </div>
                <div class="summary-row total-row">
                    <span class="label-total">Total</span>
                    <span class="value-total">Rp33.000,00</span>
                </div>
            </div>

            <button class="btn-checkout">CHECK OUT &rarr;</button>
            
            <div class="continue-shopping">
                <a href="katalog.html">&larr; Continue Shopping</a>
            </div>

        </div>
    </div>

</body>
</html>
